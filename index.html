<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>神奇寶貝碰碰碰</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft JhengHei", sans-serif;
    }

    body {
        background: radial-gradient(circle, #3488eb 0%, #052a63 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px 8px;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* 開場全屏遮罩 */
    .start-mask {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85) url("https://s1.52poke.com/wiki/thumb/2/2b/%E5%8A%A8%E7%94%BB%E9%A6%96%E4%BD%9C_%E6%97%A5%E6%9C%AC_%E6%B5%B7%E6%8A%A53%EF%BC%88%E6%97%A0%E6%96%87%E5%AD%97%EF%BC%89.png/421px-%E5%8A%A8%E7%94%BB%E9%A6%96%E4%BD%9C_%E6%97%A5%E6%9C%AC_%E6%B5%B7%E6%8A%A53%EF%BC%88%E6%97%A0%E6%96%87%E5%AD%97%EF%BC%89.png?20230612145226") center / cover no-repeat;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
    }

    /* 開始畫面大標題 */
    .start-title {
        font-size: 52px;
        color: #ffd700;
        font-weight: bold;
        text-shadow: 4px 4px #ff2222, 0 0 24px #ffd700;
        text-align: center;
        line-height: 1.2;
    }

    .start-btn {
        padding: 21px 48px;
        font-size: 30px;
        border: none;
        border-radius: 12px;
        background: #ffd700;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .start-btn:hover {
        transform: scale(1.08);
    }

    /* 底部製作小字 */
    .copyright-text {
        position: absolute;
        bottom: 20px;
        color: rgba(255,255,255,0.75);
        font-size: 14px;
        letter-spacing: 1px;
    }

    .start-mask.hidden {
        display: none;
        pointer-events: none;
    }

    /* 通關徽章 / 館主過場 */
    .level-up-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.88);
        z-index: 99998;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        padding: 20px;
    }

    .level-up-overlay.show {
        display: flex;
    }

    .level-up-images {
        display: flex;
        align-items: center;
        gap: 24px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .badge-img {
        width: 90px;
        height: 90px;
        object-fit: contain;
    }
    /* 館主圖放大兩倍 */
    .gym-leader-img {
        width: 260px;
        height: 260px;
        object-fit: contain;
    }

    .level-up-text {
        color: #ffd700;
        font-size: 22px;
        font-weight: bold;
        text-shadow: 2px 2px #000;
    }

    /* 大木博士+1綠色閃爍提示 */
    .add-oh-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 99997;
        display: none;
        align-items: center;
        justify-content: center;
    }
    .add-oh-text {
        font-size: 36px;
        color: #36d399;
        font-weight: bold;
        text-shadow: 0 0 10px #36d399;
        animation: flashGreen 0.4s infinite;
    }
    @keyframes flashGreen {
        0%,100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.1); }
    }
    .add-oh-overlay.show {
        display: flex;
    }

    h1 {
        color: #fff;
        text-shadow: 2px 2px #ff7700;
        font-size: 24px;
        margin-bottom: 8px;
        text-align: center;
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
    }

    .title-logo {
        height: 28px;
        width: auto;
    }

    .title-pokemon-text {
        height: 37.5px;
        width: auto;
        vertical-align: middle;
    }

    .info-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        color: white;
        font-size: 15px;
        margin-bottom: 10px;
        justify-content: center;
    }
    /* 剩餘時間文字樣式 + 閃爍動畫 */
    .time-text {
        transition: all 0.2s;
    }
    @keyframes flashYellow {
        0%,100% { text-shadow: 0 0 6px #ffd700,0 0 12px #ffd700; }
        50% { text-shadow: 0 0 18px #ffd700,0 0 30px #ffd700; }
    }
    @keyframes flashRed {
        0%,100% { text-shadow: 0 0 6px #ff2222,0 0 12px #ff2222; }
        50% { text-shadow: 0 0 18px #ff2222,0 0 30px #ff2222; }
    }
    .flash-yellow {
        font-size: 1.5em !important;
        animation: flashYellow 0.5s infinite;
    }
    .flash-red {
        font-size: 2em !important;
        animation: flashRed 0.4s infinite;
    }

    .mode-group, .tool-group {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
        justify-content: center;
    }

    button {
        padding: 7px 10px;
        font-size: 13px;
        border: none;
        border-radius: 7px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.15s;
    }

    button:active {
        transform: scale(0.96);
    }

    .mode-btn { background: #36d399; color: #111; }
    .tool-btn { background: #f46060; color: white; }
    .reset-btn { background: #6677ff; color: white; }
    .sound-btn { background: #ff9922; color: #111; }

    .pc-view #gameBox {
        grid-template-columns: repeat(var(--col), 64px) !important;
    }

    .pc-view .cell {
        width: 64px;
        height: 64px;
        max-width: 64px;
        max-height: 64px;
    }

    .pc-view h1 {
        font-size: 28px;
    }

    .pc-view .title-logo {
        height: 34px;
    }

    .pc-view .title-pokemon-text {
        height: 45px;
    }

    .pc-view button {
        padding: 10px 14px;
        font-size: 15px;
    }

    #gameBox {
        display: grid;
        gap: 4px;
        background: rgba(255,255,255,0.18);
        padding: 8px;
        border-radius: 10px;
        box-shadow: 0 0 20px #0055ff55;
        grid-template-columns: repeat(var(--col), 12vw);
        --col:8;
    }

    .cell {
        width: 12vw;
        height: 12vw;
        max-width: 52px;
        max-height: 52px;
        background: #fff;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        transition: transform 0.18s ease;
        overflow: hidden;
        font-size: 10px;
        text-align: center;
        position: relative;
    }

    .cell img {
        width: 90%;
        height: 90%;
        object-fit: contain;
    }

    /* 妙蛙種子 / 小火龍 / 傑尼龜：原有基礎上下移 1/15 格子 */
    .cell img.big-sprite {
        width: 150%;
        height: 150%;
        transform: translateY(-1.67%);
    }

    .cell.poke-ball-catch {
        animation: pokeBallCatch 0.45s ease-out forwards !important;
        z-index: 10 !important;
    }

    .cell.poke-ball-catch::before {
        content: "🔴";
        position: absolute;
        width: 36px;
        height: 36px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 36px;
        animation: ballBounce 0.45s ease-out forwards !important;
        z-index: 11 !important;
    }

    @keyframes pokeBallCatch {
        0% { transform: scale(1); opacity: 1; }
        35% { transform: scale(1.15); opacity: 1; }
        70% { transform: scale(0.6); opacity: 0.8; }
        100% { transform: scale(0); opacity: 0; }
    }

    @keyframes ballBounce {
        0% { transform: translate(-50%, -50%) scale(0.5) rotate(0deg); }
        45% { transform: translate(-50%, -50%) scale(1.2) rotate(-10deg); }
        80% { transform: translate(-50%, -50%) scale(0.9) rotate(5deg); }
        100% { transform: translate(-50%, -50%) scale(0.4) rotate(0deg); }
    }

    .cell.gold-shine {
        box-shadow: 0 0 6px 2px #ffd700, inset 0 0 4px #ffd700;
    }

    .cell.red-shine {
        box-shadow: 0 0 6px 2px #ff2222, inset 0 0 4px #ff6666;
    }

    .cell:active {
        transform: scale(1.05);
    }

    .cell.selected {
        box-shadow: 0 0 0 3px #ff2222, 0 0 8px #ff3333;
    }

    .empty {
        background: transparent !important;
    }

    .cell.cross-gold::after,
    .cell.cross-red::after,
    .cell.star-gold::after,
    .cell.star-red::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
        animation: laserFlash 0.4s ease-out;
    }

    @keyframes laserFlash {
        0% { opacity: 0; filter: brightness(3); }
        40% { opacity: 1; filter: brightness(1.8); }
        100% { opacity: 0; filter: brightness(1); }
    }

    .cell.cross-gold::after {
        box-shadow: 0 0 8px #ffd700, inset 0 0 0 3px #ffd700;
        background: linear-gradient(#ffd700,#ffd700), linear-gradient(#ffd700,#ffd700);
        background-size: 100% 4px, 4px 100%;
        background-repeat: no-repeat;
        background-position: center;
    }

    .cell.cross-red::after {
        box-shadow: 0 0 8px #ff2222, inset 0 0 0 3px #ff2222;
        background: linear-gradient(#ff2222,#ff2222), linear-gradient(#ff2222,#ff2222);
        background-size: 100% 4px, 4px 100%;
        background-repeat: no-repeat;
        background-position: center;
    }

    .cell.star-gold::after {
        box-shadow: 0 0 8px #ffd700, inset 0 0 0 3px #ffd700;
        background: linear-gradient(45deg,#ffd700,#ffd700), linear-gradient(-45deg,#ffd700,#ffd700);
        background-size: 70% 4px, 70% 4px;
        background-repeat: no-repeat;
        background-position: center;
    }

    .cell.star-red::after {
        box-shadow: 0 0 8px #ff2222, inset 0 0 0 3px #ff2222;
        background: linear-gradient(45deg,#ff2222,#ff2222), linear-gradient(-45deg,#ff2222,#ff2222);
        background-size: 70% 4px, 70% 4px;
        background-repeat: no-repeat;
        background-position: center;
    }

    .super-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.75);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        overflow: hidden;
    }

    .super-poke-img {
        width: 50vw;
        height: 50vh;
        object-fit: contain;
        animation: superSlideInOut 0.8s ease-in-out forwards;
    }

    @keyframes superSlideInOut {
        0% { transform: translateX(-120vw) scale(0.2); opacity: 0; }
        35% { transform: translateX(0) scale(1); opacity: 1; }
        65% { transform: translateX(0) scale(1); opacity: 1; }
        100% { transform: translateX(120vw) scale(1); opacity: 0; }
    }

    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.78);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
        padding: 10px;
    }

    .modal-box {
        background: #fff;
        padding: 24px 16px;
        border-radius: 12px;
        text-align: center;
        width: 90%;
        max-width: 320px;
    }

    .modal h2 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    .modal p {
        font-size: 16px;
        margin-bottom: 16px;
    }

    .modal button {
        font-size: 16px;
        padding: 10px 24px;
        background: #2277ff;
        color: white;
    }
</style>
</head>
<body>
<!-- 開場遮罩 -->
<div class="start-mask" id="startMask">
    <h2 class="start-title">神奇寶貝碰碰碰</h2>
    <button class="start-btn" id="startBtn">點擊開始遊戲 Start Game</button>
    <div class="copyright-text">[文心鑫品]製作 2026/07/08</div>
</div>

<!-- 通關徽章 / 館主過場 -->
<div class="level-up-overlay" id="levelUpOverlay">
    <div class="level-up-images">
        <img class="badge-img" id="badgeImg" alt="徽章">
        <img class="gym-leader-img" id="gymLeaderImg" alt="道館館主">
    </div>
    <div class="level-up-text">恭喜取得徽章，進入下一關~</div>
</div>

<!-- 大木博士+1綠色提示彈窗 -->
<div class="add-oh-overlay" id="addOhOverlay">
    <div class="add-oh-text">大木博士次數 +1</div>
</div>

<h1>
    <img class="title-logo" src="https://s1.52poke.com/wiki/thumb/4/4b/Wikilogo.png/80px-Wikilogo.png" alt="寶可夢標誌">
    <img class="title-pokemon-text" src="https://megapx-assets.dcard.tw/images/dd992d04-53a5-452b-92fb-48244e106cce/640.jpeg" alt="神奇寶貝">
    碰碰碰
</h1>

<div class="info-bar">
    <div>關卡：<span id="level">1</span></div>
    <div>得分：<span id="score">0</span>/<span id="target">300</span></div>
    <div>剩餘時間：<span class="time-text" id="time">60</span>秒</div>
    <div>連鎖倍率：x<span id="chain">1</span></div>
    <div>大木博士：<span id="ohwNum">2</span></div>
</div>

<div class="mode-group">
    <button class="mode-btn" onclick="toggleView()">電腦/手機</button>
    <button class="sound-btn" id="soundBtn">音效開關（開）</button>
    <button class="reset-btn" onclick="restartGame()">重新開始</button>
</div>

<div class="tool-group">
    <button class="tool-btn" onclick="useOhw()">大木博士救救我！</button>
</div>

<div id="gameBox"></div>

<div class="super-overlay" id="superOverlay">
    <img class="super-poke-img" id="superImg" alt="大絕">
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <button onclick="closeModal()">確定</button>
    </div>
</div>

<script>
// ===================== Web Audio 音訊系統（二進位解碼版） =====================
let audioCtx = null;
let soundOn = true;
let bgmPlaying = false;
let bgmInterval = null; // 合成BGM計時器
let audioUnlocked = false;
let tickInterval = null;

// 音訊緩存（解碼後的音頻數據）
let bgmBuffer = null;
let bgmSource = null;
let bgmGain = null;
const cryBuffers = [null, null, null, null, null];
const cryUrls = [
    "audio/0002_cry.opus", // 妙蛙種子
    "audio/0001_cry.opus", // 小火龍
    "audio/0010_cry.opus", // 傑尼龜
    "audio/0025O_cry.opus",// 皮卡丘
    "audio/0017_cry.opus"  // 伊布
];
const bgmUrl = "audio/bgm.opus";

// 初始化音訊上下文
function initAudioContext() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.25;
    bgmGain.connect(audioCtx.destination);
}

// 通用：加載並解碼音訊檔案
async function loadAudioBuffer(url) {
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const arrayBuf = await res.arrayBuffer();
        return await audioCtx.decodeAudioData(arrayBuf);
    } catch (e) {
        console.warn("音訊解碼失敗:", url, e);
        return null;
    }
}

// 初始化背景音樂（非同步載入）
async function initBGM() {
    if (bgmBuffer !== null) return;
    bgmBuffer = await loadAudioBuffer(bgmUrl);
    if (!bgmBuffer) {
        console.warn("BGM 解碼失敗，將使用合成音效");
    }
}

// 初始化寶可夢叫聲（非同步載入）
async function initCryAudio() {
    for (let i = 0; i < cryUrls.length; i++) {
        if (cryBuffers[i]) continue;
        cryBuffers[i] = await loadAudioBuffer(cryUrls[i]);
    }
}

// 播放單次短音效（用於叫聲、操作音）
function playBuffer(buffer, volume = 0.6) {
    if (!soundOn || !audioCtx || !buffer) return false;
    const source = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    source.buffer = buffer;
    gain.gain.value = volume;
    source.connect(gain);
    gain.connect(audioCtx.destination);
    source.start(0);
    return true;
}

// 基礎合成音（通用備用）
function playTone(freq, duration, type = "square", vol = 0.3, delay = 0) {
    if (!soundOn || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    const startTime = audioCtx.currentTime + delay;
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(vol, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
}

// 消除音效
function playClearSound() {
    playTone(880, 0.12, "square", 0.25);
    playTone(1320, 0.12, "square", 0.2, 0.08);
}

// 過關基礎音效
function playLevelUpSound() {
    playTone(523, 0.15, "sine", 0.3);
    playTone(659, 0.15, "sine", 0.3, 0.12);
    playTone(784, 0.22, "sine", 0.3, 0.24);
}

// 徽章過場慶祝音效
function playCelebrateSound() {
    playTone(523, 0.12, "square", 0.25);
    playTone(659, 0.12, "square", 0.25, 0.1);
    playTone(784, 0.12, "square", 0.25, 0.2);
    playTone(1046, 0.2, "square", 0.25, 0.3);
    playTone(784, 0.15, "sine", 0.2, 0.35);
}

// 失敗音效
function playFailSound() {
    playTone(294, 0.18, "triangle", 0.3);
    playTone(262, 0.28, "triangle", 0.25, 0.15);
}

// 30秒提示音效
function play30sAlert() {
    playTone(1046, 0.15, "sine", 0.35);
    playTone(1318, 0.15, "sine", 0.35, 0.1);
}

// 倒數滴答聲
function playTick() {
    playTone(660, 0.08, "square", 0.2);
}

// 時間到爆炸音效
function playBombSound() {
    playTone(120, 0.4, "sawtooth", 0.4);
    playTone(80, 0.6, "sawtooth", 0.3, 0.1);
}

// ===== 寶可夢叫聲（優先真實音檔，失敗自動降級合成版） =====
function playPokeCrySynth(index) {
    if (!soundOn || !audioCtx) return;
    switch(index) {
        case 0:
            playTone(220, 0.12, "square", 0.28);
            playTone(260, 0.15, "square", 0.28, 0.1);
            break;
        case 1:
            playTone(440, 0.1, "sawtooth", 0.25);
            playTone(580, 0.14, "sawtooth", 0.25, 0.08);
            break;
        case 2:
            playTone(330, 0.11, "triangle", 0.3);
            playTone(300, 0.13, "triangle", 0.3, 0.09);
            break;
        case 3:
            playTone(880, 0.08, "square", 0.28);
            playTone(1100, 0.1, "square", 0.28, 0.07);
            break;
        case 4:
            playTone(390, 0.12, "sine", 0.3);
            playTone(420, 0.14, "sine", 0.3, 0.1);
            break;
    }
}

function playPokeCry(index) {
    if (!soundOn || !audioUnlocked) return;
    const buf = cryBuffers[index];
    if (!buf || !playBuffer(buf, 0.6)) {
        playPokeCrySynth(index);
    }
}

// ===== BGM 控制（優先真實音檔，失敗自動降級合成版） =====
function startSynthBGM() {
    if (bgmPlaying || !audioCtx) return;
    bgmPlaying = true;
    const pokemonMainMelody = [330, 370, 440, 370,330,294,330,262,330,370,440,494,440,370,330,370];
    let noteIdx = 0;
    bgmInterval = setInterval(() => {
        playTone(pokemonMainMelody[noteIdx], 0.2, "sawtooth", 0.07);
        noteIdx = (noteIdx + 1) % pokemonMainMelody.length;
    }, 210);
}

function startBGM() {
    if (bgmPlaying || !soundOn || !audioUnlocked) return;
    bgmPlaying = true;
    
    // 優先播放解碼好的真實BGM
    if (bgmBuffer) {
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = bgmBuffer;
        bgmSource.loop = true;
        bgmSource.connect(bgmGain);
        bgmSource.start(0);
        return;
    }
    
    // 還沒解碼完成或解碼失敗，用合成版
    startSynthBGM();
}

function stopBGM() {
    bgmPlaying = false;
    // 停止真實BGM
    if (bgmSource) {
        try { bgmSource.stop(); } catch(e) {}
        bgmSource = null;
    }
    // 停止合成BGM
    clearInterval(bgmInterval);
}

function toggleSound() {
    soundOn = !soundOn;
    const btn = document.getElementById("soundBtn");
    btn.innerText = soundOn ? "音效開關（開）" : "音效開關（關）";
    if (!audioUnlocked) return;
    if (soundOn) startBGM();
    else stopBGM();
}

let col = 8, row = 8;

startBtn.addEventListener("click", handleStartGame);
soundBtn.addEventListener("click", toggleSound);

function handleStartGame() {
    initAudioContext();
    // 恢復音訊上下文，解決部分瀏覽器自動掛起問題
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    // 使用者互動後才非同步載入音訊，符合自動播放政策
    initBGM();
    initCryAudio();
    audioUnlocked = true;
    playTone(440, 0.01, "sine", 0.01);
    startMask.classList.add("hidden");
    if (soundOn) startBGM();
    initBoard();
}

function toggleView() {
    isPcView = !isPcView;
    document.body.classList.toggle("pc-view", isPcView);
    restartGame();
}

function setColByLevel() {
    if (level <= 5) {
        col = 6;
        row = 6;
    } else if (level <= 10) {
        col = 8;
        row = 8;
    } else {
        col = 10;
        row = 10;
    }
    gameBox.style.setProperty('--col', col);
}

function hasAnyMatch() {
    for (let y = 0; y < row; y++) {
        for (let x = 0; x < col - 2; x++) {
            let v = grid[y][x];
            if (v === null) continue;
            if (grid[y][x+1] === v && grid[y][x+2] === v) return true;
        }
    }
    for (let x = 0; x < col; x++) {
        for (let y = 0; y < row - 2; y++) {
            let v = grid[y][x];
            if (v === null) continue;
            if (grid[y+1][x] === v && grid[y+2][x] === v) return true;
        }
    }
    return false;
}

function generateLine(){
    let l=[],s=[];
    for(let x=0;x<col;x++){
        let i=Math.floor(Math.random()*pokeList.length);
        l.push(i);
        s.push(Math.random()<=0.03 ? (Math.random()>0.5?"gold":"red"):null);
    }
    return {line:l,shineLine:s};
}

function initBoard(){
    setColByLevel();
    while(true){
        grid=[];shineGrid=[];gameBox.innerHTML="";
        gameBox.style.gridTemplateColumns=`repeat(${col},12vw)`;
        for(let y=0;y<row;y++){
            let d=generateLine();
            grid.push(d.line);shineGrid.push(d.shineLine);
        }
        if(!hasAnyMatch())break;
    }
    startTimer();
    render();
}

function startTimer(){
    clearInterval(timeTimer);
    clearInterval(tickInterval);
    timeLeft=60;
    timeText.className="time-text";
    timeDom.innerText=timeLeft;
    timeTimer=setInterval(()=>{
        timeLeft--;
        timeDom.innerText=timeLeft;
        if(timeLeft===30){
            timeText.classList.add("flash-yellow");
            play30sAlert();
            setTimeout(()=>timeText.classList.remove("flash-yellow"),2000);
        }
        if(timeLeft===10){
            timeText.classList.add("flash-red");
            tickInterval=setInterval(playTick,500);
        }
        if(timeLeft<=0){
            clearInterval(tickInterval);
            playBombSound();
            gameOver(false);
        }
    },1000);
}

function render(clearPos=[],skillLines=[]){
    gameBox.innerHTML="";
    for(let y=0;y<row;y++){
        for(let x=0;x<col;x++){
            let d=document.createElement("div");
            d.className="cell";
            let k=`${x},${y}`;
            if(clearPos.includes(k))d.classList.add("poke-ball-catch");
            if(shineGrid[y][x]==="gold")d.classList.add("gold-shine");
            if(shineGrid[y][x]==="red")d.classList.add("red-shine");
            skillLines.forEach(i=>{
                if(i.x===x&&i.y===y){
                    if(i.type==="cross")d.classList.add(shineGrid[y][x]==="gold"?"cross-gold":"cross-red");
                    else d.classList.add(shineGrid[y][x]==="gold"?"star-gold":"star-red");
                }
            });
            if(grid[y][x]===null){
                d.classList.add("empty");
            }else{
                let p=pokeList[grid[y][x]];
                d.innerHTML=`<img src="${p.cellUrl}" alt="${p.name}" class="${p.big?'big-sprite':''}" onerror="this.style.display='none';this.parentElement.innerText='${p.name}'">`;
            }
            d.dataset.x=x;d.dataset.y=y;
            if(selected&&selected.x===x&&selected.y===y)d.classList.add("selected");
            d.onclick=()=>clickCell(x,y);
            gameBox.appendChild(d);
        }
    }
    scoreDom.innerText=score;
    targetDom.innerText=targetScore;
    timeDom.innerText=timeLeft;
    levelDom.innerText=level;
    chainDom.innerText=chainMul;
    ohwDom.innerText=ohwNum;
}

function clickCell(x,y){
    if(grid[y][x]===null)return;
    if(shineGrid[y][x]!==null){triggerSuperSkill(x,y);return;}
    if(!selected){selected={x,y};render();return;}
    if(selected.x===x&&selected.y===y){selected=null;render();return;}
    let dx=Math.abs(selected.x-x),dy=Math.abs(selected.y-y);
    let near=(dx===1&&dy===0)||(dx===0&&dy===1);
    if(!near){selected={x,y};render();return;}
    swap(selected.x,selected.y,x,y);
    chainMul=1;
    setTimeout(()=>{
        let c=checkAllClear();
        if(c.size===0)swap(selected.x,selected.y,x,y);
        else {playClearSound();executeClear(c);}
        selected=null;render();checkGameState();
    },100);
}

function triggerSuperSkill(x,y){
    let pokeIndex = grid[y][x];
    playPokeCry(pokeIndex);
    let p=pokeList[pokeIndex];
    superImg.src=p.superUrl;
    superOverlay.style.display="flex";
    let t=Math.random()>0.5?"cross":"star";
    let del=t==="cross"?[[x,y],[x-1,y],[x+1,y],[x,y-1],[x,y+1]]:[[x,y],[x-1,y-1],[x+1,y-1],[x-1,y+1],[x+1,y+1]];
    let s=[];
    del.forEach(pt=>{
        let px=pt[0],py=pt[1];
        if(px>=0&&px<col&&py>=0&&py<row)s.push({x:px,y:py,type:t});
    });
    render([],s);
    setTimeout(()=>{
        superOverlay.style.display="none";
        del.forEach(pt=>{
            let px=pt[0],py=pt[1];
            if(px>=0&&px<col&&py>=0&&py<row){
                grid[py][px]=null;
                shineGrid[py][px]=null;
            }
        });
        playClearSound();
        dropBlock();
        fillEmpty();
        setTimeout(autoClear,200);
        render();
    },800);
}

function swap(x1,y1,x2,y2){
    let t=grid[y1][x1];
    grid[y1][x1]=grid[y2][x2];
    grid[y2][x2]=t;
    let ts=shineGrid[y1][x1];
    shineGrid[y1][x1]=shineGrid[y2][x2];
    shineGrid[y2][x2]=ts;
}

function checkAllClear(){
    let s=new Set();
    for(let y=0;y<row;y++){
        for(let x=0;x<col-2;x++){
            let v=grid[y][x];
            if(v===null)continue;
            if(grid[y][x+1]===v&&grid[y][x+2]===v){
                let k=x;
                while(k<col&&grid[y][k]===v){
                    s.add(`${k},${y}`);
                    k++;
                }
            }
        }
    }
    for(let x=0;x<col;x++){
        for(let y=0;y<row-2;y++){
            let v=grid[y][x];
            if(v===null)continue;
            if(grid[y+1][x]===v&&grid[y+2][x]===v){
                let k=y;
                while(k<row&&grid[k][x]===v){
                    s.add(`${x},${k}`);
                    k++;
                }
            }
        }
    }
    return s;
}

function executeClear(set){
    let arr=Array.from(set);
    render(arr);
    setTimeout(()=>{
        let add=arr.length*10*chainMul;
        score+=add;
        arr.forEach(p=>{
            let [x,y]=p.split(",").map(Number);
            grid[y][x]=null;
            shineGrid[y][x]=null;
        });
        dropBlock();
        fillEmpty();
        chainMul++;
        let next=checkAllClear();
        if(next.size>0)executeClear(next);
        else {
            chainMul=1;
            render();
            checkGameState();
        }
    },450);
}

function dropBlock(){
    for(let x=0;x<col;x++){
        for(let y=row-1;y>=0;y--){
            if(grid[y][x]===null){
                for(let up=y-1;up>=0;up--){
                    if(grid[up][x]!==null){
                        grid[y][x]=grid[up][x];
                        grid[up][x]=null;
                        shineGrid[y][x]=shineGrid[up][x];
                        shineGrid[up][x]=null;
                        break;
                    }
                }
            }
        }
    }
}

function fillEmpty(){
    for(let y=0;y<row;y++){
        for(let x=0;x<col;x++){
            if(grid[y][x]===null){
                grid[y][x]=Math.floor(Math.random()*pokeList.length);
                let r=Math.random();
                shineGrid[y][x]=r<=0.03?(r>0.5?"gold":"red"):null;
            }
        }
    }
}

function autoClear(){
    let s=checkAllClear();
    if(s.size>0){
        playClearSound();
        executeClear(s);
    } else render();
}

function checkGameState(){
    if(score>=targetScore){
        playLevelUpSound();
        nextLevel();
        return;
    }
}

function gameOver(isWin){
    clearInterval(timeTimer);
    clearInterval(tickInterval);
    if(!isWin){
        playFailSound();
        modalTitle.innerText="挑戰失敗";
        modalText.innerText=`得分 ${score} / 目標 ${targetScore}`;
        modal.style.display="flex";
    }
}

function closeModal(){modal.style.display="none";}

function useOhw(){
    if(ohwNum<=0){
        alert("大木博士已經累了，請下一關再試！");
        return;
    }
    ohwNum--;
    superImg.src=ohwUrl;
    superOverlay.style.display="flex";
    setTimeout(()=>{
        superOverlay.style.display="none";
        let list=[];
        for(let y=0;y<row;y++){
            for(let x=0;x<col;x++){
                if(grid[y][x]!==null)list.push({x,y});
            }
        }
        let del=Math.min(10,list.length);
        for(let i=0;i<del;i++){
            let r=Math.floor(Math.random()*list.length);
            let p=list.splice(r,1)[0];
            grid[p.y][p.x]=null;
            shineGrid[p.y][p.x]=null;
        }
        playClearSound();
        dropBlock();
        fillEmpty();
        setTimeout(autoClear,200);
        render();
    },800);
}

function nextLevel(){
    clearCount++;
    if(clearCount % 3 === 0){
        ohwNum++;
        showAddOhTip();
    }
    level++;
    targetScore=300+(level-1)*320;
    score=0;
    chainMul=1;
    selected=null;
    clearInterval(timeTimer);
    clearInterval(tickInterval);
    showLevelUpOverlay(level);
    setTimeout(()=>initBoard(),1000);
}

function restartGame(){
    score=0;
    level=1;
    targetScore=300;
    chainMul=1;
    selected=null;
    ohwNum=2;
    clearCount=0;
    clearInterval(timeTimer);
    clearInterval(tickInterval);
    closeModal();
    // 重置BGM狀態
    stopBGM();
    bgmPlaying = false;
    if(soundOn && audioUnlocked) startBGM();
    initBoard();
}
</script>
</body>
</html>
