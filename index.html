<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>神奇寶貝消消樂</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft JhengHei", sans-serif;
        overscroll-behavior: none;
    }
    body {
        background: radial-gradient(circle, #3488eb 0%, #052a63 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 12px 8px;
        min-height: 100vh;
        overflow-x: hidden;
    }
    .start-mask {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.85) url("assets/start-bg.png") center / cover no-repeat;
        z-index: 99999; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 24px;
    }
    .start-title {
        font-size: 52px; color: #ffd700; font-weight: bold;
        text-shadow: 4px 4px #ff2222, 0 0 24px #ffd700;
        text-align: center; line-height: 1.2;
    }
    .game-intro {
        color: white; text-align: left; background: rgba(0,0,0,0.55);
        padding: 16px 22px; border-radius: 10px; max-width: 380px;
        line-height: 1.7; font-size: 14px; backdrop-filter: blur(4px);
    }
    .game-intro h3 { color: #ffd700; margin-bottom: 8px; text-align: center; font-size: 18px; }
    .game-intro ul { padding-left: 22px; display: flex; flex-direction: column; gap: 4px; }
    .loading-bar-wrap { width: 320px; text-align: center; }
    .loading-text {
        margin-bottom: 10px; font-size: 18px; font-weight: bold; color: #ffd700;
        text-shadow: 0 0 8px rgba(255,215,0,0.6); letter-spacing: 2px;
    }
    .loading-bar {
        width: 100%; height: 12px; background: rgba(255,255,255,0.2);
        border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3);
    }
    .loading-progress {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #ffd700, #ffaa00);
        transition: width 0.3s ease; box-shadow: 0 0 10px #ffd700;
    }
    .start-btn {
        padding: 21px 48px; font-size: 30px; line-height: 1.4;
        border: none; border-radius: 12px; background: #ffd700;
        color: #000; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    .start-btn:disabled { background: #888; cursor: not‑allowed; transform: none !important; opacity: 0.7; }
    .start-btn:hover:not(:disabled) { transform: scale(1.08); }
    .copyright-text { position: absolute; bottom: 20px; color: #000; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
    .start-mask.hidden { display: none; pointer-events: none; }

    .level-up-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.88);
        z-index: 99998; display: none; align-items: center;
        justify-content: center; flex-direction: column; gap: 14px; padding: 20px;
    }
    .level-up-overlay.show { display: flex; }
    .level-up-images { display: flex; align-items: center; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .badge-img { width: 90px; height: 90px; object-fit: contain; }
    .gym-leader-img { width: 220px; height: 220px; object-fit: contain; }
    .level-up-text { color: #ffd700; font-size: 22px; font-weight: bold; text-shadow: 2px 2px #000; }
    .level-quote {
        color: #fff; font-size: 16px; max-width: 420px; text-align: center;
        line-height: 1.7; text-shadow: 1px 1px 2px #000; font-style: italic;
    }
    .next-level-btn {
        padding: 12px 32px; font-size: 18px; background: #ffd700; color: #000;
        border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        transition: 0.2s; margin-top: 8px;
    }
    .next-level-btn:hover { transform: scale(1.08); }

    .game-over-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.88);
        z-index: 99998; display: none; align-items: center;
        justify-content: center; flex-direction: column; gap: 18px; padding: 20px;
    }
    .game-over-overlay.show { display: flex; }
    .game-over-text { color: #fff; font-size: 20px; font-weight: bold; text-shadow: 2px 2px #000; text-align: center; max-width: 320px; line-height: 1.5; }

    .joy-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.75);
        z-index: 99997; display: none; align-items: center;
        justify-content: center; flex-direction: column; gap: 20px; pointer-events: none;
    }
    .joy-img { width: 70vw; max-width: 320px; height: auto; object-fit: contain; animation: superSlideInOut 2s ease-in-out forwards; }
    .joy-text { color: #ffd700; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000, 0 0 12px #ffd700; animation: fadeInOut 2s ease-in-out forwards; }
    @keyframes fadeInOut {
        0% { opacity: 0; transform: scale(0.8); }
        20% { opacity: 1; transform: scale(1); }
        80% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.1); }
    }
    @keyframes superSlideInOut {
        0% { transform: translateX(-120vw) scale(0.2); opacity: 0; }
        35% { transform: translateX(0) scale(1); opacity: 1; }
        65% { transform: translateX(0) scale(1); opacity: 1; }
        100% { transform: translateX(120vw) scale(1); opacity: 0; }
    }

    .gold-flash-overlay {
        position: fixed; inset: 0;
        background: radial-gradient(circle, #fff9c4 0%, #ffd700 50%, #ffaa00 100%);
        opacity: 0; pointer-events: none; z-index: 99996;
    }
    .gold-flash-overlay.play { animation: goldFlash 0.5s ease-in-out forwards; }
    @keyframes goldFlash { 0% { opacity: 0; } 50% { opacity: 0.85; } 100% { opacity: 0; } }

    .add-oh-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        z-index: 99997; display: none; align-items: center; justify-content: center;
    }
    .add-oh-text { font-size: 36px; color: #36d399; font-weight: bold; text-shadow: 0 0 10px #36d399; animation: flashGreen 0.4s infinite; }
    @keyframes flashGreen { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.1); } }
    .add-oh-overlay.show { display: flex; }

    h1 { color: #fff; text-shadow: 2px 2px #ff7700; font-size: 24px; margin-bottom: 8px; text-align: center; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .title-pokemon-img { height: 56.25px; width: auto; vertical-align: middle; }

    .info-bar { display: flex; flex-wrap: wrap; gap: 10px 20px; color: white; font-size: 15px; margin-bottom: 10px; justify-content: center; align-items: center; }
    .level-skill-row {
        display: flex; align-items: center; justify-content: center;
        gap: 20px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .level-info { text-align: center; line-height: 1.3; }
    .level-num { font-size: 16px; font-weight: bold; }
    .gym-name { font-size: 14px; color: #ffd700; }
    .level-badge { height: 26px; width: auto; margin-top: 2px; vertical-align: middle; }

    .skill-bar-container { display: flex; align-items: center; gap: 14px; padding: 8px 18px; background: rgba(0,0,0,0.25); border-radius: 10px; }
    .skill-icon { width: 38px; height: 38px; object-fit: contain; opacity: 0.35; transition: all 0.2s; }
    .skill-icon.active { opacity: 1; filter: drop-shadow(0 0 4px rgba(255,255,255,0.6)); }
    .skill-dots { display: flex; gap: 8px; }
    .skill-dot { width: 18px; height: 18px; border-radius: 3px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); transition: all 0.2s; }

    .time-text { transition: all 0.2s; font-weight: bold; }
    @keyframes flashYellow {
        0% { transform: scale(1); color:#ffd700; text-shadow: 0 0 6px #ffd700,0 0 12px #ffd700; }
        50% { transform: scale(1.15); color:#ffd700; text-shadow:0 0 20px #ffd700,0 0 35px #ffd700; }
        100% { transform: scale(1); color:#ffd700; text-shadow: 0 0 6px #ffd700,0 0 12px #ffd700; }
    }
    @keyframes flashRed {
        0% { transform: scale(1); color:#ff4444; text-shadow: 0 0 6px #ff2222,0 0 12px #ff2222; }
        50% { transform: scale(1.15); color:#ff4444; text-shadow:0 0 20px #ff2222,0 0 35px #ff2222; }
        100% { transform: scale(1); color:#ff4444; text-shadow: 0 0 6px #ff2222,0 0 12px #ff2222; }
    }
    .flash-yellow { animation: flashYellow 0.6s infinite; }
    .flash-red { animation: flashRed 0.3s infinite; }

    .mode-group, .tool-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; justify-content: center; }
    button { padding: 7px 10px; font-size: 13px; border: none; border-radius: 7px; font-weight: bold; cursor: pointer; transition: 0.15s; }
    button:active { transform: scale(0.96); }
    .mode-btn { background: #36d399; color: #111; }
    .tool-btn { background: #f46060; color: white; }
    .reset-btn { background: #6677ff; color: white; }
    .sound-btn { background: #ff9922; color: #111; }

    #gameBox {
        display: grid; gap: 4px; background: rgba(255,255,255,0.18);
        padding: 8px; border-radius: 10px; box-shadow: 0 0 20px #0055ff55;
        grid-template-columns: repeat(6, 14vw); position: relative;
    }
    .lives-container { width: 100%; max-width: calc(6*14vw + 16px); display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; padding-right: 8px; }
    .life-icon { height: 24px; width: auto; opacity: 0.95; filter: drop-shadow(0 0 2px rgba(255,215,0,0.6)); }

    .cell {
        width: 14vw; height: 14vw; max-width: 56px; max-height: 56px;
        background: #fff; border-radius: 8px; display: flex;
        align-items: center; justify-content: center; cursor: pointer;
        user-select: none; transition: transform 0.18s ease;
        overflow: hidden; font-size: 10px; text-align: center; position: relative;
    }
    .cell img { width: 90%; height: 90%; object-fit: contain; }
    .cell img.big-sprite { width: 150%; height: 150%; transform: translateY(-1.67%); }
    .cell.poke-ball-catch { animation: pokeBallCatch 0.45s ease-out forwards !important; z-index: 10 !important; }
    .cell.poke-ball-catch::before {
        content: "🔴"; position: absolute; width: 36px; height: 36px;
        top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-size: 36px; animation: ballBounce 0.45s ease-out forwards !important; z-index: 11 !important;
    }
    @keyframes pokeBallCatch {
        0% { transform: scale(1); opacity: 1; }
        35% { transform: scale(1.15); opacity: 1; }
        70% { transform: scale(0.6); opacity: 0.8; }
        100% { transform: scale(0); opacity: 0; }
    }
    @keyframes ballBounce {
        0% { transform: translate(-50%,-50%) scale(0.5) rotate(0deg); }
        45% { transform: translate(-50%,-50%) scale(1.2) rotate(-10deg); }
        80% { transform: translate(-50%,-50%) scale(0.9) rotate(5deg); }
        100% { transform: translate(-50%,-50%) scale(0.4) rotate(0deg); }
    }
    .cell.gold-shine { box-shadow: 0 0 6px 2px #ffd700, inset 0 0 4px #ffd700; }
    .cell.red-shine { box-shadow: 0 0 6px 2px #ff2222, inset 0 0 4px #ff6666; }
    .cell:active { transform: scale(1.05); }
    .cell.selected { box-shadow: 0 0 0 3px #ff2222, 0 0 8px #ff3333; }
    .empty { background: transparent !important; }

    .super-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 9999; overflow: hidden; }
    .super-poke-img { width: 100vw; height: 100vh; object-fit: contain; animation: superSlideInOut 0.8s ease-in-out forwards; }

    .ultimate-overlay { position: fixed; inset:0; z-index:99995; display:none; align-items:center; justify-content:center; pointer-events:none; overflow:hidden; background:rgba(0,0,0,0.6); }
    .ultimate-img { position:absolute; width:100vw; height:100vh; object‑fit:contain; opacity:0; z-index:1; }
    .ultimate-img.play { animation: superSlideInOut 0.8s ease-in-out forwards; }
    .ultimate-text {
        position: relative; z-index:2; font-size:72px; font-weight:bold;
        -webkit-text‑stroke:1.5px #000;
        text-shadow: 1.5px 1.5px 0 #000, -1.5px -1.5px 0 #000, 0 0 20px currentColor,0 0 40px currentColor;
        animation: ultTextAnim 1.33s ease-out forwards;
    }
    @keyframes ultTextAnim { 0% { transform: scale(0.2); opacity:0; } 30% { transform: scale(1.3); opacity:1; } 70% { transform: scale(1); opacity:1; } 100% { transform: scale(1.6); opacity:0; } }
    .particle-item { position:absolute; border-radius:50%; pointer-events:none; animation: particleFloat 1.5s ease-out forwards; }
    @keyframes particleFloat {0%{transform:scale(0) translateY(0); opacity:1;}100%{transform:scale(1.5) translateY(-100px); opacity:0;}}

    .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.78); display:none; align-items:center; justify-content:center; z-index:999; padding:10px; }
    .modal-box { background:#fff; padding:24px 16px; border-radius:12px; text-align:center; width:90%; max-width:320px; }
    .modal h2 { font-size:22px; margin-bottom:10px; }
    .modal p { font-size:16px; margin-bottom:16px; }
    .modal button { font-size:16px; padding:10px 24px; background:#2277ff; color:white; }
    .modal-btn-group { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .modal-yes { background:#36d399 !important; color:#111 !important; }
    .modal-no { background:#f46060 !important; color:white !important; }

    .final-clear-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.92);
        z-index: 99999; display: none; align-items: center;
        justify-content: center; flex-direction: column; gap: 20px; padding: 20px;
    }
    .final-clear-overlay.show { display: flex; }
    .final-title {
        font-size: 42px; color: #ffd700; font-weight: bold;
        text-shadow: 3px 3px #ff2222, 0 0 20px #ffd700;
        text-align: center; animation: titleGlow 1.5s ease-in-out infinite alternate;
    }
    @keyframes titleGlow { from{text-shadow:3px 3px #ff2222,0 0 10px #ffd700;} to{text-shadow:3px 3px #ff2222,0 0 30px #ffaa00;}}
    .final-img { width:280px; height:280px; object-fit: contain; animation: imgBounce 2s ease-in-out infinite; }
    @keyframes imgBounce {0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
    .final-desc { color:white; font-size:18px; text-align:center; line-height:1.6; max-width:340px; }
    .restart-final-btn { padding:14px 36px; font-size:20px; background:#ffd700; color:#000; border:none; border-radius:10px; font-weight:bold; cursor:pointer; transition:0.2s; }
    .restart-final-btn:hover { transform:scale(1.08); }
</style>
</head>
<body>
<div class="start-mask" id="startMask">
    <h2 class="start-title">神奇寶貝消消樂</h2>
    <div class="game-intro">
        <h3>遊戲說明</h3>
        <ul>
            <li>拖曳交換相鄰寶可夢，三隻以上相同即可消除</li>
            <li>4顆連線產生特殊閃耀寶可夢</li>
            <li>蓄滿3格能量釋放專屬大絕招</li>
            <li>倒數結束前達成目標分數即可過關</li>
            <li>生命用完遊戲結束，每5關增加一次復活機會</li>
        </ul>
    </div>
    <div class="loading-bar-wrap">
        <div class="loading-text" id="loadingText">遊戲載入中</div>
        <div class="loading-bar"><div class="loading-progress" id="loadingProgress"></div></div>
    </div>
    <button class="start-btn" id="startBtn" disabled>開始遊戲</button>
    <div class="copyright-text">神奇寶貝Match‑3 V1.0</div>
</div>

<div class="level-up-overlay" id="levelUpOverlay">
    <div class="level-up-images">
        <img class="badge-img" id="badgeImg" alt="徽章">
        <img class="gym-leader-img" id="gymLeaderImg" alt="館主">
    </div>
    <div class="level-up-text" id="levelUpText">恭喜通關</div>
    <div class="level-quote" id="levelQuote"></div>
    <button class="next-level-btn" id="nextLevelBtn" onclick="goNextLevel()">下一關</button>
</div>

<div class="game-over-overlay" id="gameOverOverlay">
    <img class="gym-leader-img" id="gameOverLeaderImg" alt="館主">
    <div class="game-over-text" id="gameOverText"></div>
</div>

<div class="joy-overlay" id="joyOverlay">
    <img class="joy-img" id="joyImg" src="assets/joy.png" alt="喬伊小姐">
    <div class="joy-text">喬伊小姐幫你恢復生命</div>
</div>

<div class="gold-flash-overlay" id="goldFlashOverlay"></div>
<div class="add-oh-overlay" id="addOhOverlay"><div class="add-oh-text">大木博士道具+1</div></div>

<div class="ultimate-overlay" id="ultimateOverlay">
    <img class="ultimate-img" id="ultimateImg">
    <div class="ultimate-text" id="ultimateText"></div>
</div>

<div class="final-clear-overlay" id="finalClearOverlay">
    <div class="final-title">🏆全部通關🏆</div>
    <img class="final-img" id="finalClearImg">
    <div class="final-desc">你擊敗坂木老大，成為寶可夢大師<br>總得分：<span id="finalScore" style="color:#ffd700;font‑weight:bold;">0</span></div>
    <button class="restart-final-btn" onclick="restartFromFinal()">重新挑戰</button>
</div>

<h1>
    <img class="title-pokemon-img" src="assets/pokemon-title.png" onerror="this.style.display='none'">
    神奇寶貝消消樂
</h1>

<div class="info-bar">
    <div>得分：<span id="score">0</span>／<span id="target">300</span></div>
    <div>剩餘時間：<span class="time-text" id="time">60</span>秒</div>
</div>

<div class="level-skill-row">
    <div class="level-info">
        <div class="level-num" id="levelNum">第1關</div>
        <div class="gym-name" id="gymName">深灰道館</div>
        <img class="level-badge" id="levelBadge">
    </div>
    <div class="skill-bar-container" id="skillBarContainer">
        <img class="skill-icon" id="skillIcon" src="assets/skill-empty.png">
        <div class="skill-dots" id="skillDots">
            <div class="skill-dot"></div>
            <div class="skill-dot"></div>
            <div class="skill-dot"></div>
        </div>
    </div>
</div>

<div class="mode-group">
    <button class="sound-btn" id="soundBtn">音效開啟</button>
    <button class="reset-btn" onclick="restartGame()">重新開始</button>
</div>

<div class="tool-group">
    <button class="tool-btn" id="ohwBtn" onclick="useOhw()">大木博士道具 [<span id="ohwNumText">2</span>]</button>
</div>

<div id="gameBox"></div>
<div class="lives-container" id="livesContainer"></div>

<div class="super-overlay" id="superOverlay">
    <img class="super-poke-img" id="superImg">
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h2 id="modalTitle">遊戲結束</h2>
        <p id="modalText"></p>
        <div class="modal-btn-group">
            <button class="modal-yes" onclick="closeModal()">確定</button>
        </div>
    </div>
</div>

<div class="modal" id="joyConfirmModal">
    <div class="modal-box">
        <h2>時間用完了</h2>
        <p>還有生命，是否使用喬伊小姐復活？</p>
        <div class="modal-btn-group">
            <button class="modal-yes" onclick="confirmJoyYes()">復活繼續</button>
            <button class="modal-no" onclick="confirmJoyNo()">放棄遊戲</button>
        </div>
    </div>
</div>

<script type="text/javascript">
const TOTAL_LEVEL = 41;
const MAX_TIME = 120;

const pokeList = [
    {
        name:"妙蛙種子",

        superUrl:"assets/pokemon/bulbasaur_super.png",

    },
    {
        name:"傑尼龜",
        cellUrl:"assets/pokemon/squirtle_cell.png",
        superUrl:"assets/pokemon/squirtle_super.png",
        skillImgUrl:"assets/skills/skill-squirtle.png",
        skillName:"水槍",
        skillColor:"#3399ff",
        particleColor:"rgba(51,153,255,0.8)",
        big:true
    },
    {
        name:"皮卡丘",
        cellUrl:"assets/pokemon/pikachu_cell.png",
        superUrl:"assets/pokemon/pikachu_super.png",
        skillImgUrl:"assets/skills/skill-pikachu.png",
        skillName:"十萬伏特",
        skillColor:"#ffdd00",
        particleColor:"rgba(255,221,0,0.8)",
        big:false
    },
    {
        name:"伊布",
        cellUrl:"assets/pokemon/eevee_cell.png",
        superUrl:"assets/pokemon/eevee_super.png",
        skillImgUrl:"assets/skills/skill-eevee.png",
        skillName:"高速星星",
        skillColor:"#d8a870",
        particleColor:"rgba(216,168,112,0.8)",
        big:false
    }
];

const gymQuotes = [
    "你的實力還有待磨練，繼續加油！",
    "寶可夢之間的羈絆，才是最強的力量。",

function getLevelBadgeData(lv) {
    if (lv <= 20) return {badge:"assets/badges/rock.png", leader:"assets/gym-leader/rock.png"};
    else if (lv <=40) return {badge:"assets/badges/water.png", leader:"assets/gym-leader/water.png"};
    else return {badge:"assets/badges/champion.png", leader:"assets/gym-leader/sakaki.png"};
}

//判斷交換之後是否可以消除
function testSwapMatch(x1, y1, x2, y2) {
    [grid[y1][x1], grid[y2][x2]] = [grid[y2][x2], grid[y1][x1]];
    const set = checkAllClear();
    [grid[y1][x1], grid[y2][x2]] = [grid[y2][x2], grid[y1][x1]];
    return set.size > 0;
}
//檢查棋盤是否還有可移動步數
function hasAvailableMoves() {
    for (let y = 0; y < row; y++) {
        for (let x = 0; x < col; x++) {
            if (x + 1 < col && testSwapMatch(x, y, x + 1, y)) return true;
            if (y + 1 < row && testSwapMatch(x, y, x, y + 1)) return true;
        }
    }
    return false;
}

function hasAnyMatch() {
    for (let y = 0; y < row; y++) {
        for (let x = 0; x < col - 2; x++) {
            const v = grid[y][x];
            if (v === null) continue;
            if (grid[y][x + 1] === v && grid[y][x + 2] === v) return true;
        }
    }
    for (let x = 0; x < col; x++) {
        for (let y = 0; y < row - 2; y++) {
            const v = grid[y][x];
            if (v === null) continue;
            if (grid[y + 1][x] === v && grid[y + 2][x] === v) return true;
        }
    }
    return false;
}

function createSafeGrid() {
    grid = [];
    shineGrid = [];
    for (let y = 0; y < row; y++) {
        grid[y] = [];
        shineGrid[y] = [];
        for (let x = 0; x < col; x++) {
            let candidate;
            do {
                candidate = Math.floor(Math.random() * pokeList.length);
            } while (
                //只禁止連續3個相同，允許2個相鄰，解決開局死局
                (x >= 2 && grid[y][x - 1] === candidate && grid[y][x - 2] === candidate) ||
                (y >= 2 && grid[y - 1][x] === candidate && grid[y - 2][x] === candidate)
            );
            grid[y][x] = candidate;
            shineGrid[y][x] = Math.random() <= 0.03 ? (Math.random() > 0.5 ? "gold" : "red") : null;
        }
    }
}

function render(clearPos = [], skillLines = []) {
    gameBox.innerHTML = "";
    scoreDom.innerText = score;
    targetDom.innerText = targetScore;
    timeDom.innerText = timeLeft;
    ohwNumText.innerText = ohwNum;
    for(let y=0; y<row; y++){
        for(let x=0; x<col; x++){
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.x = x;
            cell.dataset.y = y;
            const key = x+","+y;
            if(clearPos.includes(key)) cell.classList.add("poke-ball-catch");
            if(shineGrid[y][x] === "gold") cell.classList.add("gold-shine");
            if(shineGrid[y][x] === "red") cell.classList.add("red-shine");
            if(grid[y][x] === null){
                cell.classList.add("empty");
            }else{
                const p = pokeList[grid[y][x]];
                let img = document.createElement("img");
                img.src = p.cellUrl;
                if(p.big) img.classList.add("big-sprite");
                img.onerror = ()=>img.remove();
                cell.appendChild(img);
            }
            if(selected && selected.x === x && selected.y === y){
                cell.classList.add("selected");
            }
            cell.onclick = ()=> clickCell(x,y);
            gameBox.appendChild(cell);

function clickCell(x,y) {
    if(isUltimateActive || isGameTransition) return;
    if(grid[y][x] === null) return;
    if(shineGrid[y][x]){
        triggerSuperSkill(x,y);
        return;
    }
    if(!selected){
        selected = {x,y};
        render();
        return;
    }
    if(selected.x === x && selected.y === y){
        selected = null;
        render();
        return;
    }
    const dx = Math.abs(selected.x - x);
    const dy = Math.abs(selected.y - y);
    if((dx ===1 && dy ===0) || (dy ===1 && dx ===0)){
        performSwap(selected.x, selected.y, x, y);
    }else{
        selected = {x,y};
        render();
    }
}

function performSwap(x1,y1,x2,y2) {
    swap(x1,y1,x2,y2);
    setTimeout(()=>{
        const matchSet = checkAllClear();
        if(matchSet.size >0){
            playSound(new Audio("assets/swap.mp3"));
            executeClear(matchSet);
        }else{
            swap(x1,y1,x2,y2);
        }
        selected = null;
        render();
        checkGameState();
    },100);
}

function triggerSuperSkill(x,y) {
    const pid = grid[y][x];
    const p = pokeList[pid];
    superImg.src = p.superUrl;
    superOverlay.style.display = "flex";
    let type = Math.random()>0.5 ? "cross":"star";
    let delList = [];
    if(type === "cross"){
        delList = [[x,y],[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
    }else{
        delList = [[x,y],[x-1,y-1],[x+1,y-1],[x-1,y+1],[x+1,y+1]];
    }
    let clearSet = new Set();
    delList.forEach(pt=>{
        let px = pt[0], py = pt[1];
        if(px >=0 && px < col && py >=0 && py < row){
            clearSet.add(px+","+py);
        }
    });
    render(Array.from(clearSet), []);
    setTimeout(()=>{
        superOverlay.style.display = "none";
        let cnt = 0;
        delList.forEach(pt=>{
            let px = pt[0], py = pt[1];
            if(px >=0 && px < col &&py >= 0 && py < row) {
                grid[py][px] = null;
                shineGrid[py][px] = null;
                cnt++;
            }
        });
        score += cnt * 8;
        playSound(new Audio("assets/pop.mp3"));
        dropBlock();
        fillEmpty();
        setTimeout(autoClear, 200);
        render();
    }, 800);
}

function swap(x1, y1, x2, y2) {
    [grid[y1][x1], grid[y2][x2]] = [grid[y2][x2], grid[y1][x1]];
    [shineGrid[y1][x1], shineGrid[y2][x2]] = [shineGrid[y2][x2], shineGrid[y1][x1]];
}

function checkAllClear() {
    const set = new Set();
    //水平判斷
    for (let y = 0; y < row; y++) {
        for (let x = 0; x < col - 2; x++) {
            const val = grid[y][x];
            if (val === null) continue;
            if (grid[y][x + 1] === val && grid[y][x + 2] === val) {
                let k = x;
                while (k < col && grid[y][k] === val) {
                    set.add(`${k},${y}`);
                    k++;
                }
            }
        }
    }
    //垂直判斷
    for (let x = 0; x < col; x++) {
        for (let y = 0; y < row - 2; y++) {
            const val = grid[y][x];
            if (val === null) continue;
            if (grid[y + 1][x] === val && grid[y + 2][x] === val) {
                let k = y;
                while (k < row && grid[k][x] === val) {
                    set.add(`${x},${k}`);
                    k++;
                }
            }
        }
    }
    return set;
}

function executeClear(set) {
    if (isGameTransition) return;
    const arr = Array.from(set);
    render(arr, []);
    const typeCount = {};
    arr.forEach(key => {
        const [x, y] = key.split(",").map(Number);
        let t = grid[y][x];
        if (t !== null) typeCount[t] = (typeCount[t] || 0) + 1;
    });
    let maxType = null, maxCnt = 0;
    for (let t in typeCount) {
        if (typeCount[t] > maxCnt) {
            maxCnt = typeCount[t];
            maxType = Number(t);
        }
    }
    setTimeout(() => {
        score += arr.length * 8 * chainMul;
        arr.forEach(key => {
            const [x, y] = key.split(",").map(Number);
            grid[y][x] = null;
            shineGrid[y][x] = null;
        });
        if (maxType !== null) addSkillProgress(maxType);
        dropBlock();
        fillEmpty();
        chainMul = Math.min(chainMul + 1, 3);
        setTimeout(() => {
            autoClear();
            render();
            checkGameState();
            // 死局判斷，沒有可移動就重新洗牌
            if (!hasAvailableMoves()) {
                do {
                    createSafeGrid();
                } while (hasAnyMatch() || !hasAvailableMoves());
                render();
            }
        }, 300);
    }, 450);
}

function dropBlock() {
    for (let x = 0; x < col; x++) {
        let stack = [];
        for (let y = row - 1; y >= 0; y--) {
            if (grid[y][x] !== null) {
                stack.push({ val: grid[y][x], shine: shineGrid[y][x] });
            }
        }
        for (let y = row - 1; y >= 0; y--) {
            if (stack.length > 0) {
                let item = stack.shift();
                grid[y][x] = item.val;
                shineGrid[y][x] = item.shine;
            } else {
                grid[y][x] = null;
                shineGrid[y][x] = null;
            }
        }
    }
}

function fillEmpty() {
    for (let y = 0; y < row; y++) {
        for (let x = 0; x < col; x++) {
            if (grid[y][x] === null) {
                grid[y][x] = Math.floor(Math.random() * pokeList.length);
                shineGrid[y][x] = Math.random() <= 0.03 ? (Math.random() > 0.5 ? "gold" : "red") : null;
            }
        }
    }
}

function autoClear() {
    if (isGameTransition) return;
    let s = checkAllClear();
    if (s.size > 0) {
        playSound(new Audio("assets/pop.mp3"));
        executeClear(s);
    }
}

function checkGameState() {
    if (isLevelTransition) return;
    if (score >= targetScore) {
        isLevelTransition = true;
        isGameTransition = true;
        clearInterval(timeTimer);
        clearInterval(tickInterval);
        tickInterval = null;
        if (currentLevel >= TOTAL_LEVEL) {
            showFinalClear();
            return;
        }
        if (currentLevel % 5 === 0 && lives < 5) {
            lives++;
            renderLives();
            addOhNum();
        }
        showLevelUp();
    }
}

function addOhNum() {
    ohwNum = Math.min(ohwNum + 1, 5);
    addOhOverlay.style.display = "flex";
    updateOhwBtnText();
    setTimeout(() => {
        addOhOverlay.style.display = "none";
    }, 1000);

function useOhw() {
    if (ohwNum <= 0 || isUltimateActive || isGameTransition) return;
    ohwNum--;
    updateOhwBtnText();
    if (soundOn) playSound(new Audio("assets/pop.mp3"));
    superImg.src = "assets/big-oak.png";
    superOverlay.style.display = "flex";
    let allList = [];
    for (let y = 0; y < row; y++) {
        for (let x = 0; x < col; x++) {
            if (grid[y][x] !== null) allList.push({ x, y });
        }
    }
    for (let i = allList.length - 1; i > 0; i--) {
        let r = Math.floor(Math.random() * (i + 1));
        [allList[i], allList[r]] = [allList[r], allList[i]];
    }
    let removeArr = allList.slice(0, Math.min(10, allList.length));
    let removeSet = new Set(removeArr.map(p => p.x + "," + p.y));
    render(Array.from(removeSet), []);
    setTimeout(() => {
        superOverlay.style.display = "none";
        removeArr.forEach(p => {
            grid[p.y][p.x] = null;
            shineGrid[p.y][p.x] = null;
        });
        score += removeArr.length * 8;
        dropBlock();
        fillEmpty();
        setTimeout(autoClear, 300);
        render();
    }, 800);
}

function gameOver() {
    isGameTransition = true;
    const bd = getLevelBadgeData(Math.min(currentLevel, TOTAL_LEVEL));
    gameOverLeaderImg.src = bd.leader;

//拖拽相關
let dragStartX = -1, dragStartY = -1;
let dragGhostEl = null;
let isDraggingPokemon = false;

function dragEndHandle(cell) {
    if (dragGhostEl) {
        dragGhostEl.remove();
        dragGhostEl = null;
    }
    isDraggingPokemon = false;
    if (!cell) {
        dragStartX = -1;
        dragStartY = -1;
        return;
    }
    const endX = Number(cell.dataset.x);
    const endY = Number(cell.dataset.y);
    const dx = Math.abs(dragStartX - endX);
    const dy = Math.abs(dragStartY - endY);
    if (dx > 1 || dy > 1 || (dx === 0 && dy === 0)) {
        dragStartX = -1;
        dragStartY = -1;
        return;
    }
    performSwap(dragStartX, dragStartY, endX, endY);
    dragStartX = -1;
    dragStartY = -1;
}

//滑鼠拖拽
gameBox.addEventListener("mousedown", (e) => {
    const cell = e.target.closest(".cell");
    if (!cell || cell.classList.contains("empty") || isUltimateActive || isGameTransition) return;
    dragStartX = Number(cell.dataset.x);
    dragStartY = Number(cell.dataset.y);
    dragGhostEl = cell.cloneNode(true);
    dragGhostEl.style.position = "fixed";
    dragGhostEl.style.zIndex = "99999";
    dragGhostEl.style.pointerEvents = "none";
    dragGhostEl.style.opacity = "0.75";
    dragGhostEl.style.transform = "scale(1.15)";
    document.body.appendChild(dragGhostEl);
    dragGhostEl.style.left = e.clientX - 30 + "px";
    dragGhostEl.style.top = e.clientY - 30 + "px";
});
document.addEventListener("mousemove", (e) => {
    if (!dragGhostEl) return;
    dragGhostEl.style.left = e.clientX - 30 + "px";
    dragGhostEl.style.top = e.clientY - 30 + "px";
});
document.addEventListener("mouseup", (e) => {
    if (dragStartX === -1) {
        if (dragGhostEl) {
            dragGhostEl.remove();
            dragGhostEl = null;
        }
        return;
    }
    const cell = document.elementFromPoint(e.clientX, e.clientY)?.closest(".cell");
    dragEndHandle(cell);
});

//觸控拖拽
gameBox.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    const cell = document.elementFromPoint(touch.clientX, touch.clientY)?.closest(".cell");
    if (!cell || cell.classList.contains("empty") || isUltimateActive || isGameTransition) return;
    dragStartX = Number(cell.dataset.x);
    dragStartY = Number(cell.dataset.y);
    isDraggingPokemon = true;
    dragGhostEl = cell.cloneNode(true);
    dragGhostEl.style.position = "fixed";
    dragGhostEl.style.zIndex = "99999";
    dragGhostEl.style.pointerEvents = "none";
    dragGhostEl.style.opacity = "0.75";
    dragGhostEl.style.transform = "scale(1.15)";
    document.body.appendChild(dragGhostEl);
    dragGhostEl.style.left = touch.clientX - 30 + "px";
    dragGhostEl.style.top = touch.clientY - 30 + "px";
});
document.addEventListener("touchmove", (e) => {
    if (!dragGhostEl) return;
    if (isDraggingPokemon) e.preventDefault();
    const touch = e.touches[0];
    dragGhostEl.style.left = touch.clientX - 30 + "px";
    dragGhostEl.style.top = touch.clientY - 30 + "px";
}, { passive: false });

document.addEventListener("touchend", (e) => {
    const touch = e.changedTouches[0];
    isDraggingPokemon = false;
    if (dragStartX === -1) {
        if (dragGhostEl) {
            dragGhostEl.remove();
            dragGhostEl = null;
        }
        return;
    }
    const cell = document.elementFromPoint(touch.clientX, touch.clientY)?.closest(".cell");
    dragEndHandle(cell);
}, { passive: true });

document.addEventListener("touchcancel", () => {
    isDraggingPokemon = false;
    dragStartX = -1;
    dragStartY = -1;
    if (dragGhostEl) {
        dragGhostEl.remove();
        dragGhostEl = null;
    }
}, { passive: true });

    "好好休息，調整狀態再回來挑戰！"
];
